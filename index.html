<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abhishek Kumar</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: 'Orbitron', sans-serif;
      background:#000;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      background:url('profile.jpeg') center/cover no-repeat;
      opacity:0.08;
      filter:blur(2px);
      z-index:-1;
    }

    .container{
      width:100%;
      max-width:430px;
      padding:20px;
      text-align:center;
    }

    .title{
      font-size:42px;
      line-height:1.2;
      margin-bottom:25px;
      font-weight:600;
      text-shadow:0 0 10px rgba(255,255,255,0.5);
    }

    .profile-card{
      margin-bottom:35px;
    }

    .profile-img{
      width:100%;
      border-radius:25px;
      border:3px solid rgba(255,255,255,0.8);
      box-shadow:0 0 25px rgba(255,255,255,0.35);
    }

    .name{
      margin-top:15px;
      font-size:32px;
      font-weight:500;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .card{
      background:rgba(0,0,0,0.75);
      border:2px solid rgba(255,255,255,0.7);
      border-radius:22px;
      padding:22px 18px;
      text-decoration:none;
      color:white;
      text-align:left;
      transition:0.3s;
      box-shadow:0 0 25px rgba(255,255,255,0.18);
      backdrop-filter:blur(6px);
    }

    .card:hover{
      transform:translateY(-6px) scale(1.03);
      box-shadow:0 0 35px rgba(255,255,255,0.4);
    }

    .card i{
      font-size:42px;
      margin-bottom:15px;
    }

    .card h2{
      font-size:20px;
      margin-bottom:10px;
    }

    .card p{
      font-size:13px;
      line-height:1.5;
      color:#d9d9d9;
      font-family:Arial, sans-serif;
    }

    @media(max-width:500px){
      .title{
        font-size:34px;
      }

      .name{
        font-size:26px;
      }

      .card h2{
        font-size:18px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1 class="title">
      Hey Welcome<br>to my site
    </h1>

    <div class="profile-card">
      <img class="profile-img" src="profile.jpeg" alt="Profile">
      <div class="name">Abhishek Kumar</div>
    </div>

    <div class="grid">

      <!-- Course -->
      <a href="https://t.me/abhishekxdi" target="_blank" class="card">
        <i class="fa-solid fa-chart-line"></i>
        <h2>Course</h2>
        <p>Complete modules available</p>
      </a>

      <!-- Instagram -->
      <a href="https://www.instagram.com/abhiii_8987?igsh=eTd0ZzB6dTV6dHM3" target="_blank" class="card">
        <i class="fa-brands fa-instagram"></i>
        <h2>Instagram</h2>
        <p>My profile, latest reels, and tips</p>
      </a>

      <!-- Telegram -->
      <a href="https://t.me/abhishekxdi" target="_blank" class="card">
        <i class="fa-brands fa-telegram"></i>
        <h2>Telegram</h2>
        <p>Join my trading community and updates</p>
      </a>

      <!-- WhatsApp -->
      <a href="https://whatsapp.com/channel/0029VbCYfw1A89Mq3dmupb2A" target="_blank" class="card">
        <i class="fa-brands fa-whatsapp"></i>
        <h2>WhatsApp</h2>
        <p>Contact me directly for inquiries</p>
      </a>

    </div>

  </div>

</body>
</html>
